name: Release Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0-rc2"
        required: true
        default: "0.1.0-rc2"
      push_rc_tag:
        description: "Also push moving rc image tag"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  BACKEND_IMAGE: ghcr.io/fedorovdo/officechat-backend
  FRONTEND_IMAGE: ghcr.io/fedorovdo/officechat-frontend

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Determine release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ inputs.version }}"
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9._-]+)?$ ]]; then
            echo "Invalid version: $version" >&2
            exit 2
          fi
          short_sha="${GITHUB_SHA::12}"
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >>"$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start backend dependencies
        run: docker compose up -d postgres valkey

      - name: Build development images
        run: docker compose build backend frontend

      - name: Backend tests
        run: docker compose run --rm backend python -m pytest -q

      - name: Frontend tests
        run: docker compose run --rm frontend npm run test:run

      - name: Frontend build
        run: docker compose run --rm frontend npm run build

      - name: Optional Playwright smoke
        continue-on-error: true
        run: docker compose run --rm frontend npm run test:e2e

      - name: Compose validation
        run: |
          docker compose -f docker-compose.prod.yml config >/dev/null
          set -a
          source .env.production.example
          set +a
          APP_SECRET_KEY=release-validation-secret-release-validation-secret \
          POSTGRES_PASSWORD=release-validation-postgres-password \
          DATABASE_URL=postgresql://officechat:release-validation-postgres-password@postgres:5432/officechat \
          PUBLIC_FRONTEND_URL=https://chat.example.com \
          PUBLIC_BACKEND_URL=https://chat.example.com \
          BACKEND_CORS_ORIGINS=https://chat.example.com \
          docker compose -f deploy/docker-compose.release.yml config >/dev/null

      - name: Shell syntax
        run: |
          bash -n scripts/release/*.sh
          bash -n scripts/release/officechatctl
          bash scripts/release/test-release-scripts.sh

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        continue-on-error: true
        with:
          scandir: ./scripts/release

      - name: Release bundle dry run
        run: bash scripts/release/create-release-bundle.sh --dry-run

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend metadata
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=sha-${{ steps.version.outputs.short_sha }}
            type=raw,value=rc,enable=${{ inputs.push_rc_tag == true || github.ref_type == 'tag' }}

      - name: Frontend metadata
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=sha-${{ steps.version.outputs.short_sha }}
            type=raw,value=rc,enable=${{ inputs.push_rc_tag == true || github.ref_type == 'tag' }}

      - name: Build and push backend image
        id: build_backend
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          target: runtime
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}

      - name: Build and push frontend image
        id: build_frontend
        uses: docker/build-push-action@v6
        with:
          context: ./apps/frontend
          target: runtime
          push: true
          build-args: |
            NEXT_PUBLIC_OFFICECHAT_VERSION=${{ steps.version.outputs.version }}
            NEXT_PUBLIC_OFFICECHAT_BUILD_SHA=${{ github.sha }}
            NEXT_PUBLIC_OFFICECHAT_BUILD_DATE=${{ github.event.repository.updated_at }}
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}

      - name: Image digest metadata
        run: |
          mkdir -p dist
          {
            echo "version=${{ steps.version.outputs.version }}"
            echo "backend_digest=${{ steps.build_backend.outputs.digest }}"
            echo "frontend_digest=${{ steps.build_frontend.outputs.digest }}"
            echo "backend_image=${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.version }}"
            echo "frontend_image=${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.version }}"
          } > dist/image-digests.txt
          sha256sum dist/image-digests.txt > dist/image-digests.txt.sha256

      - name: Create release bundle
        env:
          OFFICECHAT_RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: bash scripts/release/create-release-bundle.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: officechat-${{ steps.version.outputs.version }}-release
          path: |
            dist/*
            release/*

      - name: Stop services
        if: always()
        run: docker compose down -v
